name: 標案即時監控

on:
  schedule:
    # 每 5 分鐘執行一次（UTC 時間，台灣為 UTC+8）
    - cron: "*/5 * * * *"
  # 也允許手動從 GitHub 介面觸發，方便測試
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要寫入 seen_tenders.json

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4
        with:
          # 確保拉取最新的 seen_tenders.json（上一次執行後推上去的）
          fetch-depth: 1

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install requests

      - name: 執行標案監控
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:   ${{ secrets.GMAIL_PASS }}
        run: python monitor.py

      - name: 儲存已通知標案快取
        run: |
          git config user.name  "tender-bot"
          git config user.email "tender-bot@yuanding.com"
          git add seen_tenders.json
          # 如果檔案有變動才 commit（沒有新標案時不會有 diff）
          git diff --staged --quiet || git commit -m "chore: update seen_tenders cache [skip ci]"
          git push
