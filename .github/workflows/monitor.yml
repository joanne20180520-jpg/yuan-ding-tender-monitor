name: 標案即時監控

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install requests playwright gspread google-auth

      - name: 安裝 Playwright 瀏覽器
        run: playwright install chromium --with-deps

      - name: 執行標案監控
        env:
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:          ${{ secrets.GMAIL_PASS }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python monitor.py

      - name: 儲存已通知標案快取
        run: |
          git config user.name  "tender-bot"
          git config user.email "tender-bot@yuanding.com"
          git add seen_tenders.json
          git diff --staged --quiet || git commit -m "chore: update seen_tenders cache [skip ci]"
          git push
